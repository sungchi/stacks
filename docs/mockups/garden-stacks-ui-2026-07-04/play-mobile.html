<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garden Stacks Mobile Play Mockup</title>
    <link rel="stylesheet" href="./mockups.css">
  </head>
  <body>
    <main class="mock-shell">
      <header class="mock-nav">
        <div class="mock-title">
          <span class="eyebrow">P0 Mobile</span>
          <h1>모바일 플레이</h1>
        </div>
        <nav class="nav-links" aria-label="목업 화면">
          <a href="./index.html">목록</a>
          <a href="./play-desktop.html">데스크톱</a>
          <a href="./store.html">상점</a>
          <a href="./codex-result.html">도감/결과</a>
        </nav>
      </header>

      <section class="phone-preview" aria-label="모바일 플레이 목업">
        <div class="screen-card">
          <header class="app-top">
            <div class="brand">
              <span class="eyebrow">Garden Stacks 4.1</span>
              <strong>Garden Stacks</strong>
            </div>
            <div class="app-menu">
              <button class="ghost-button" type="button">스테이지</button>
              <button class="ghost-button" type="button">상점</button>
              <button class="ghost-button" type="button">도감</button>
              <button class="icon-button" type="button" aria-label="메뉴">M</button>
            </div>
            <div class="status-strip">
              <div class="progress-block">
                <div class="progress-meta">
                  <span>초지 숫자길</span>
                  <strong>102/295</strong>
                </div>
                <div class="progress-track" style="--value:35%"><span></span></div>
              </div>
              <div class="stat-pill"><span>내기</span><strong>13</strong></div>
              <div class="stat-pill"><span>갈기</span><strong>3</strong></div>
            </div>
          </header>

          <section class="table" aria-label="게임 보드">
            <div class="garden-grid">
              <article class="garden-slot is-drop">
                <div class="slot-head"><span>정원 1</span><strong>2흐름</strong></div>
                <div class="slot-center">
                  <span class="mini-card" style="--i:0; --accent:#6b55a4"><b>3</b><img src="../../../public/assets/garden-stacks/generated/cards/occupant_bee.png" alt=""></span>
                  <span class="mini-card" style="--i:1; --accent:#4f9a54"><b>4</b><img src="../../../public/assets/garden-stacks/generated/cards/hand_watering.png" alt=""></span>
                  <span class="mini-card" style="--i:2; --accent:#6b55a4"><b>5</b><img src="../../../public/assets/garden-stacks/generated/cards/floor_forest_shade_walk.png" alt=""></span>
                  <span class="preview-badge"><span>추천</span><strong>+27</strong></span>
                </div>
                <div class="slot-foot"><span>이웃수</span><strong>x4</strong></div>
              </article>

              <article class="garden-slot">
                <div class="slot-head"><span>정원 2</span><strong>1흐름</strong></div>
                <div class="slot-center">
                  <span class="mini-card" style="--i:1; --accent:#356d8f"><b>9</b><img src="../../../public/assets/garden-stacks/generated/cards/bird_tab.png" alt=""></span>
                  <span class="preview-badge"><span>합 9</span><strong>+18</strong></span>
                </div>
                <div class="slot-foot"><span>철새</span><strong>x3</strong></div>
              </article>

              <article class="garden-slot is-risk">
                <div class="slot-head"><span>정원 3</span><strong>0흐름</strong></div>
                <div class="slot-center">
                  <span class="empty-bed">초지</span>
                  <span class="preview-badge"><span>새 흐름</span><strong>+8</strong></span>
                </div>
                <div class="slot-foot"><span>비어 있음</span><strong>x1</strong></div>
              </article>

              <article class="garden-slot">
                <div class="slot-head"><span>정원 4</span><strong>3흐름</strong></div>
                <div class="slot-center">
                  <span class="mini-card" style="--i:0; --accent:#4f9a54"><b>0</b><img src="../../../public/assets/garden-stacks/generated/cards/floor_meadow.png" alt=""></span>
                  <span class="mini-card" style="--i:1; --accent:#4f9a54"><b>1</b><img src="../../../public/assets/garden-stacks/generated/cards/occupant_clover.png" alt=""></span>
                  <span class="mini-card" style="--i:2; --accent:#4f9a54"><b>2</b><img src="../../../public/assets/garden-stacks/generated/cards/occupant_flower.png" alt=""></span>
                  <span class="preview-badge"><span>이웃수</span><strong>+24</strong></span>
                </div>
                <div class="slot-foot"><span>꽃망울</span><strong>x5</strong></div>
              </article>
            </div>

            <div class="hint-line">
              <div>
                <span>추천</span>
                <strong>나비 -> 정원 1</strong>
              </div>
              <button class="ghost-button is-soft" type="button">추천 놓기</button>
            </div>

            <section class="hand-rail" aria-label="손패">
              <div class="hand-head">
                <div>
                  <span class="eyebrow">손패</span>
                  <h3>카드 선택</h3>
                </div>
                <button class="primary-button" type="button">갈아엎기</button>
              </div>
              <div class="hand-row">
                <article class="hand-card is-selected" style="--accent:#6b55a4">
                  <div class="card-top"><span class="digit">6</span><span class="card-kind">동물</span></div>
                  <img src="../../../public/assets/garden-stacks/generated/cards/bee_tab.png" alt="">
                </article>
                <article class="hand-card" style="--accent:#6b55a4">
                  <div class="card-top"><span class="digit">5</span><span class="card-kind">지형</span></div>
                  <img src="../../../public/assets/garden-stacks/generated/cards/floor_forest_shade_walk.png" alt="">
                </article>
                <article class="hand-card" style="--accent:#356d8f">
                  <div class="card-top"><span class="digit">8</span><span class="card-kind">지형</span></div>
                  <img src="../../../public/assets/garden-stacks/generated/cards/floor_wetland.png" alt="">
                </article>
                <article class="hand-card" style="--accent:#356d8f">
                  <div class="card-top"><span class="digit">9</span><span class="card-kind">동물</span></div>
                  <img src="../../../public/assets/garden-stacks/generated/cards/bird_tab.png" alt="">
                </article>
                <article class="hand-card" style="--accent:#4f9a54">
                  <div class="card-top"><span class="digit">0</span><span class="card-kind">지형</span></div>
                  <img src="../../../public/assets/garden-stacks/generated/cards/floor_meadow.png" alt="">
                </article>
              </div>
            </section>

            <aside class="bottom-sheet" aria-label="선택 카드 상세">
              <div class="section-head">
                <div>
                  <span class="eyebrow">선택 카드</span>
                  <h3>6 나비</h3>
                </div>
                <span class="change-pill"><span class="color-dot" style="--accent:#6b55a4"></span> 동물 · 보라</span>
              </div>
              <div class="reason-row"><span>정원 1 이웃수 유지</span><strong>+27</strong></div>
              <div class="reason-row"><span>정원 4 흐름은 좋지만 배율 낮음</span><strong>+24</strong></div>
            </aside>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>

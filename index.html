<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f8f5" />
    <title>Stacks (스택스) - 매시간 숫자 정원</title>
    <meta name="description" content="매시간 새 숫자 덱에 도전하고 네 장 합과 카드·정원 최장 연쇄로 별을 얻는 카드 게임." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23f8fbf4'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' font-family='sans-serif' font-weight='900' fill='%23142a19'%3ES%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./src/styles.css?v=20260712-stable-preview-1" />
  </head>
  <body>
    <div id="app">
      <main class="shell loading-shell" aria-busy="true" aria-live="polite">
        <section class="loading-content">
          <h1>Stacks (스택스)</h1>
          <p>4정원 숫자 솔리테어를 준비하는 중</p>
        </section>
      </main>
    </div>
    <script>
      (() => {
        const mode = new URLSearchParams(location.search).get("mode");
        if (!mode || ["hourly", "default", "latest"].includes(mode)) {
          location.replace(`./simple/${location.search}${location.hash}`);
        }
      })();
    </script>
    <script src="./public/app.bundle.js?v=20260712-stable-preview-1"></script>
  </body>
</html>

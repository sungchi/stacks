    <style>
      html, body { min-height: 100%; margin: 0; background: #fff; }
      .root-loading { display: grid; min-height: 100vh; place-items: center; font: 900 20px/1 sans-serif; }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="root-loading" aria-busy="true" aria-live="polite">
        <strong>Stacks</strong>
      </main>
    </div>
    <script>
      (() => {
        const mode = new URLSearchParams(location.search).get("mode");
        const legacy = ["endless", "campaign"].includes(mode);
        const runtime = legacy
          ? { css: "./src/styles.css?v=20260712-stable-preview-1", js: "./public/app.bundle.js?v=20260712-stable-preview-1" }
          : { css: "./simple/simple.css?v=20260715-card-image-offset-v2", js: "./simple/simple.bundle.js?v=20260715-card-image-offset-v2" };
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = runtime.css;
        const start = () => {
          if (document.querySelector("script[data-stacks-runtime]")) return;
          const script = document.createElement("script");
          script.src = runtime.js;
          script.dataset.stacksRuntime = legacy ? "legacy" : "hourly";
          document.body.append(script);
        };
        stylesheet.addEventListener("load", start, { once: true });
        stylesheet.addEventListener("error", start, { once: true });
        document.head.append(stylesheet);
      })();
    </script>
  </body>
